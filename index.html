<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samos Planning v3.0</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&family=Pacifico&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f3ef;
  --surface: #fff;
  --surface2: #f0ede8;
  --border: #ddd9d0;
  --border-strong: #c8c2b8;
  --accent: #c8860a;
  --accent2: #d44f1e;
  --accent-light: rgba(200,134,10,0.1);
  --text: #1a1714;
  --text-muted: #7a736a;
  --text-dim: #b0a89e;
  --radius: 4px;
  --font-display: 'Playfair Display', serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --shadow: 0 1px 4px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.04);
}
body { font-family:var(--font-body); background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

/* ── HEADER ── */
header { display:flex; align-items:center; padding:0 20px; height:52px; border-bottom:1px solid var(--border); background:var(--surface); flex-shrink:0; gap:12px; }
.logo { font-family:var(--font-display); font-size:17px; font-weight:900; letter-spacing:-.5px; color:var(--text); white-space:nowrap; }
.logo span { color:var(--accent); }
.version-badge { font-family:var(--font-mono); font-size:10px; color:var(--text-dim); background:var(--surface2); border:1px solid var(--border); padding:2px 7px; border-radius:10px; flex-shrink:0; }
.header-center { flex:1; max-width:360px; display:none; }
  .header-center.visible { display:block; }
.doc-title-input { background:var(--surface2); border:1px solid var(--border); color:var(--text); font-family:var(--font-body); font-size:13px; padding:6px 12px; border-radius:var(--radius); width:100%; outline:none; transition:border-color .2s; }
  .header-center.visible #docTitle { flex:1; min-width:0; width:auto; }
  .header-center.visible #titleImgUrl { flex:1; min-width:0; width:auto; }
.doc-title-input:focus { border-color:var(--accent); background:#fff; }
.header-actions { display:flex; gap:6px; align-items:center; margin-left:auto; }
.btn { padding:6px 13px; border-radius:var(--radius); font-family:var(--font-body); font-size:12px; font-weight:500; cursor:pointer; border:none; transition:all .15s; white-space:nowrap; }
.btn-ghost { background:transparent; border:1px solid var(--border-strong); color:var(--text-muted); }
.btn-ghost:hover { border-color:var(--text-muted); color:var(--text); background:var(--surface2); }
.btn-accent { background:var(--accent); color:#fff; font-weight:700; }
.btn-accent:hover { background:#b07508; }
.btn-danger { background:transparent; border:1px solid #e0c0c0; color:#c04418; }
.btn-danger:hover { background:rgba(212,79,30,.08); }

/* ── LAYOUT ── */
.app { display:flex; flex-direction:column; flex:1; overflow:hidden; min-height:0; }

  /* Default: preview only */
  .sidebar, .editor { display:none; }
  .block-adder { display:none; }
  .preview-panel { flex:1; overflow-y:auto; background:var(--bg); min-height:0; }

  /* edit-body hidden by default */
  .edit-body { display:none; }

  /* Edit mode */
  .app.edit-mode { display:grid; grid-template-rows:auto 1fr; grid-template-columns:1fr 1fr; }
  .app.edit-mode .block-adder { display:flex; grid-column:1/-1; align-items:center; gap:8px; padding:8px 16px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; flex-wrap:wrap; }
  .app.edit-mode .edit-body { display:flex; overflow:hidden; min-height:0; border-right:1px solid var(--border); }
  .app.edit-mode .editor { display:flex; flex:1; min-width:0; }
  .app.edit-mode .preview-panel { overflow-y:auto; border-left:none; }
  .app.edit-mode .sidebar { display:none; }

  /* Block adder bar */
  .block-adder-label { font-size:11px; font-weight:600; color:var(--text-muted); white-space:nowrap; }
  .block-adder-select { padding:7px 12px; border:1px solid var(--border); border-radius:var(--radius); background:var(--surface2); color:var(--text); font-family:var(--font-body); font-size:13px; cursor:pointer; outline:none; min-width:200px; }
  .block-adder-select:focus { border-color:var(--accent); }
  .block-adder-add { padding:7px 18px; background:var(--accent); color:#fff; border:none; border-radius:var(--radius); font-size:13px; font-weight:600; cursor:pointer; transition:background .15s; }
  .block-adder-add:hover { background:#b07508; }

/* ── SIDEBAR ── */
.sidebar { display:none; }
.sidebar-header { padding:12px 14px; border-bottom:1px solid var(--border); font-size:10px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--text-muted); background:var(--surface2); }
.block-palette { padding:8px; display:flex; flex-direction:column; gap:4px; overflow-y:auto; }
.palette-group-label { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--text-dim); padding:8px 4px 3px; font-weight:600; }
.palette-item { display:flex; align-items:center; gap:10px; padding:9px 11px; border:1px solid var(--border); border-radius:var(--radius); cursor:pointer; transition:all .15s; background:var(--surface); user-select:none; }
.palette-item:hover { border-color:var(--accent); background:var(--accent-light); transform:translateX(2px); }
.palette-item:active { transform:translateX(0) scale(.98); }
.palette-icon { width:26px; height:26px; border-radius:3px; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }
.palette-info { flex:1; min-width:0; }
.palette-name { font-size:12px; font-weight:500; color:var(--text); }
.palette-desc { font-size:10px; color:var(--text-muted); margin-top:1px; }

/* ── EDITOR ── */
.editor { display:none; flex-direction:column; overflow:hidden; background:var(--bg); min-height:0; }
.editor-toolbar { display:flex; align-items:center; padding:9px 14px; border-bottom:1px solid var(--border); background:var(--surface); font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-muted); }
.block-count { margin-left:auto; font-family:var(--font-mono); font-size:11px; color:var(--text-dim); }
.editor-body { flex:1; overflow:hidden; position:relative; display:flex; flex-direction:column; min-height:0; height:0; }
.empty-state { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--text-dim); gap:10px; text-align:center; padding:40px; pointer-events:none; z-index:1; }
.empty-state .icon { font-size:40px; opacity:.25; }
.empty-state h3 { font-family:var(--font-display); font-size:18px; color:var(--text-muted); }
.empty-state p { font-size:12px; line-height:1.6; max-width:240px; color:var(--text-muted); }
.blocks-list { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:7px; position:relative; z-index:2; min-height:0; height:100%; }

/* ── BLOCK CARD ── */
/* ── BLOCK GROUPS ── */
.block-group { margin-bottom:8px; }
.block-group-header { display:flex; align-items:center; gap:8px; padding:8px 12px; background:#484ddb; color:#fff; font-size:11px; font-weight:700; letter-spacing:.5px; cursor:pointer; user-select:none; border-radius:4px; }
.block-group-header:hover { background:#3a3fc0; }
.block-group-chevron { font-size:10px; transition:transform .2s; margin-left:auto; opacity:.8; }
.block-group-header.collapsed .block-group-chevron { transform:rotate(-90deg); }
.block-group-count { font-size:10px; opacity:.65; font-weight:400; white-space:nowrap; }
.block-group-body { padding-left:12px; border-left:3px solid #484ddb; margin-top:2px; }
.block-group-body.collapsed { display:none; }

.block-card { background:var(--surface); border:1px solid var(--border); border-radius:6px; overflow:hidden; transition:border-color .15s; animation:slideIn .18s ease; box-shadow:var(--shadow); flex-shrink:0; }
@keyframes slideIn { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:translateY(0)} }
.block-card:hover { border-color:var(--border-strong); }
.block-card.active { border-color:var(--accent); box-shadow:0 0 0 2px rgba(200,134,10,.12); }
.block-header { display:flex; align-items:center; gap:8px; padding:8px 10px; cursor:pointer; border-bottom:1px solid transparent; background:var(--surface2); transition:border-color .1s; }
.block-card.active .block-header { border-bottom-color:var(--border); }
.block-handle { color:var(--text-dim); font-size:12px; cursor:grab; padding:2px 4px; border-radius:3px; }
.block-handle:active { cursor:grabbing; }
.block-handle:hover { color:var(--accent); }
.block-card.drag-over-top { border-top:2px solid var(--accent); }
.block-card.drag-over-bottom { border-bottom:2px solid var(--accent); }
.block-card.dragging { opacity:0.4; }
.block-type-badge { font-size:9px; letter-spacing:1.5px; text-transform:uppercase; padding:2px 7px; border-radius:2px; font-weight:600; font-family:var(--font-mono); flex-shrink:0; }
.block-preview-text { flex:1; font-size:12px; color:var(--text-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
.block-actions { display:flex; gap:1px; opacity:0; transition:opacity .12s; flex-shrink:0; }
.block-card:hover .block-actions { opacity:1; }
.block-action-btn { background:none; border:none; color:var(--text-muted); cursor:pointer; padding:3px 7px; border-radius:3px; font-size:13px; line-height:1; transition:all .1s; }
.block-action-btn:hover { background:var(--border); color:var(--text); }
.block-action-btn.del:hover { background:rgba(212,79,30,.12); color:var(--accent2); }
.block-body { padding:12px; display:flex; flex-direction:column; gap:8px; }
.block-body.collapsed { display:none; }
.field-group { display:flex; flex-direction:column; gap:3px; }
.field-label { font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--text-muted); font-weight:600; }
.field-input, .field-textarea { background:var(--surface2); border:1px solid var(--border); color:var(--text); font-family:var(--font-body); font-size:13px; padding:7px 10px; border-radius:var(--radius); outline:none; transition:border-color .15s,background .15s; width:100%; }
.field-input:focus, .field-textarea:focus { border-color:var(--accent); background:#fff; }
.field-textarea { resize:vertical; min-height:66px; line-height:1.5; }
.field-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }

/* block type colors */
.type-day         { background:rgba(212,79,30,.12);  color:#c04418; }
.type-hour        { background:rgba(30,100,200,.1);  color:#2060c8; }
.type-description { background:rgba(30,160,80,.1);   color:#1a9050; }
.type-link        { background:rgba(120,60,200,.1);  color:#7830c8; }
.type-image       { background:rgba(200,80,150,.1);  color:#c83090; }

/* ── JSON PANEL ── */
/* json-panel display managed by edit-mode */
.json-tabs { display:flex; border-bottom:1px solid var(--border); background:var(--surface2); }
.json-tab { padding:11px 16px; font-size:11px; font-weight:600; letter-spacing:.5px; cursor:pointer; border:none; background:none; color:var(--text-muted); border-bottom:2px solid transparent; transition:all .12s; }
.json-tab.active { color:var(--accent); border-bottom-color:var(--accent); background:var(--surface); }
.json-tab:hover:not(.active) { color:var(--text); }
.json-content { flex:1; overflow:auto; background:#1e1e2e; }
.json-code { font-family:var(--font-mono); font-size:11px; line-height:1.75; padding:14px; color:#a0a8c0; white-space:pre; min-height:100%; }
.json-code .key  { color:#7ec8e3; }
.json-code .str  { color:#a8e6a3; }
.json-code .num  { color:#f0c66a; }
.json-code .bool { color:#ff9060; }
.json-code .null { color:#888; }
.panel-actions { flex-shrink:0; padding:10px 12px; background:var(--surface); border-top:1px solid var(--border); display:flex; gap:6px; }

/* ── PREVIEW ── */
.preview-wrap { font-family:var(--font-body); background:var(--bg); }
  .pv-doc-title { padding:36px 32px 28px; background:var(--surface); border-bottom:3px solid #484ddb; display:flex; align-items:center; gap:20px; }
  .pv-doc-title-img { width:72px; height:72px; object-fit:cover; border-radius:8px; flex-shrink:0; }
  .pv-doc-title-text { font-family:'Segoe Print', 'Pacifico', cursive; font-size:42px; font-weight:700; color:#6B2D8B; line-height:1.1; letter-spacing:0; }

/* Day block — full-width dark band */
.pv-day {
  background: #484ddb;
  padding: 14px 22px;
  margin-top: 24px;
}
.pv-day:first-child { margin-top: 0; }

/* Date large + label inline */
.pv-day-header { display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
.pv-day-date {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 700;
  color: #fff;
  text-transform: capitalize;
}
.pv-day-sep { color: rgba(255,255,255,0.25); font-size:16px; line-height:1; }
.pv-day-label {
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 400;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.2px;
}

/* Timeline — indented under the day band */
.pv-timeline {
  margin-left: 28px;
  border-left: 2px solid var(--border-strong);
}

/* Activity row: time col | content col */
.pv-activity-row {
  display: grid;
  grid-template-columns: 72px 1fr;
  border-bottom: 1px solid var(--border);
}
.pv-activity-row:last-child { border-bottom: none; }

.pv-time {
  padding: 10px 10px 10px 0;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  justify-content: flex-start;
  background: var(--surface);
  position: relative;
}
.pv-time::before {
  content: '';
  position: absolute;
  left: -6px;
  top: 14px;
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 50%;
  border: 2px solid var(--bg);
}
.pv-time-val { font-family:var(--font-mono); font-size:12px; font-weight:500; color:var(--accent); }
.pv-time-dur { font-family:var(--font-mono); font-size:9px; color:var(--text-dim); margin-top:1px; }

.pv-activity-content { padding:10px 14px; display:flex; flex-direction:column; gap:4px; background:var(--bg); }
.pv-activity-desc { font-size:13px; color:var(--text-muted); line-height:1.6; }
.pv-memo-row { background:#fff0f0; }
.pv-memo-row .pv-time { background:#ffe0e0; border-right-color:#ffb3b3; }
.pv-memo-row .pv-time-val { color:#c0392b; }
.pv-memo-row .pv-time::before { background:#c0392b; }
.pv-memo-row .pv-activity-content { background:#fff5f5; }
.pv-memo-row .pv-activity-desc { color:#7a1a1a; }
.pv-link { display:inline-flex; align-items:center; gap:5px; font-size:11px; color:var(--accent); text-decoration:none; border:1px solid rgba(200,134,10,.3); padding:3px 10px; border-radius:2px; font-family:var(--font-mono); width:fit-content; }
.pv-link:hover { background:var(--accent-light); }
.pv-img-wrap { width:100%; }
  .pv-img { max-width:100%; height:auto; max-height:260px; object-fit:contain; border-radius:3px; border:1px solid var(--border); display:block; }
.pv-img-caption { font-size:10px; color:var(--text-dim); font-style:italic; }
.pv-img-ph { width:100%; height:60px; background:var(--surface2); border:1px dashed var(--border-strong); border-radius:3px; display:flex; align-items:center; justify-content:center; color:var(--text-dim); font-size:11px; }
.pv-orphan { padding:10px 14px; border-bottom:1px solid var(--border); display:flex; flex-direction:column; gap:5px; background:var(--bg); }

/* ── SCROLLBARS ── */
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border-strong); border-radius:3px; }

/* ── MODAL ── */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); display:flex; align-items:center; justify-content:center; z-index:100; opacity:0; pointer-events:none; transition:opacity .2s; }
.modal-overlay.show { opacity:1; pointer-events:all; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:22px; width:90%; max-width:480px; transform:translateY(8px); transition:transform .2s; box-shadow:0 16px 48px rgba(0,0,0,.18); }
.modal-overlay.show .modal { transform:translateY(0); }
.modal h3 { font-family:var(--font-display); font-size:19px; margin-bottom:14px; color:var(--text); }
.modal-actions { display:flex; gap:8px; margin-top:14px; justify-content:flex-end; }
.import-error { color:var(--accent2); font-size:12px; margin-top:6px; min-height:16px; }
.drop-zone { border:2px dashed var(--border-strong); border-radius:6px; padding:28px 20px; text-align:center; cursor:pointer; transition:all .15s; background:var(--surface2); position:relative; }
.drop-zone:hover, .drop-zone.dragover { border-color:var(--accent); background:var(--accent-light); }
.drop-zone input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.drop-zone-icon { font-size:28px; margin-bottom:8px; }
.drop-zone-label { font-size:13px; color:var(--text-muted); }
.drop-zone-sub { font-size:11px; color:var(--text-dim); margin-top:4px; }
.drop-zone.file-ok { border-color:var(--accent); background:rgba(200,134,10,.06); }
.drop-zone.file-ok .drop-zone-label { color:var(--accent); font-weight:600; }

/* ── TOAST ── */
.toast { position:fixed; bottom:20px; right:20px; background:var(--text); color:#fff; font-weight:600; font-size:12px; padding:9px 16px; border-radius:4px; transform:translateY(50px); opacity:0; transition:all .25s; z-index:9999; pointer-events:none; }
.toast.show { transform:translateY(0); opacity:1; }
.toast.ok  { background:#1a7a40; }
.toast.err { background:#c04418; }

#clipboardHelper { position:fixed; left:-9999px; top:0; opacity:0; }
</style>
</head>
<body>

<header>
  <div class="logo">Samos<span>◆</span>Planning</div>
  <span class="version-badge">v3.0</span>
  <div class="header-center">
    <input class="doc-title-input" id="docTitle" type="text" placeholder="Nom du document…" value="Samos — Été 2025">
<input class="doc-title-input title-img-input" id="titleImgUrl" type="text" placeholder="🖼 URL image (optionnel)…">
    <button class="title-img-clear" id="btnClearTitleImg" title="Supprimer l'image">✕</button>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" id="btnImport">⬆ Importer</button>
    <button class="btn btn-danger" id="btnClear">✕ Vider</button>
    <button class="btn btn-edit" id="btnEdit">✏ Édition</button>
    <button class="btn btn-ghost" id="btnCopy">⎘ Copier JSON</button>
    <button class="btn btn-accent" id="btnExport">⬇ Exporter JSON</button>
  </div>
</header>

<div class="app">

  <!-- BLOCK ADDER BAR (edit mode only) -->
  <div class="block-adder">
    <span class="block-adder-label">Ajouter un bloc&nbsp;:</span>
    <select class="block-adder-select" id="blockTypeSelect">
      <option value="">— Choisir un type —</option>
      <option value="day">📅 Jour</option>
      <option value="activity">🎯 Activité</option>
      <option value="link">🔗 Lien</option>
      <option value="image">🖼 Image</option>
      <option value="memo">🔴 Mémo</option>
    </select>
    <button class="block-adder-add" id="btnAddBlock">+ Ajouter</button>
  </div>

  <!-- EDITOR (edit mode only) -->
  <div class="edit-body">
    <div class="editor">
      <div class="editor-toolbar">
        <span>✦ Éditeur de blocs</span>
        <span class="block-count" id="blockCount">0 bloc(s)</span>
      </div>
      <div class="editor-body">
        <div class="empty-state" id="emptyState">
          <div class="icon">◈</div>
          <h3>Document vide</h3>
          <p>Cliquez sur un bloc ci-dessus pour commencer.</p>
        </div>
        <div class="blocks-list" id="blocksList"></div>
      </div>
    </div>
  </div>

  <!-- PREVIEW (always visible, direct child of .app) -->
  <div class="preview-panel" id="previewPanel">
    <div id="previewArea"></div>
  </div>

  <!-- hidden JSON helpers -->
  <div id="jsonContent" style="display:none"><div id="jsonCode"></div></div>

</div>

<!-- IMPORT MODAL -->
<div class="modal-overlay" id="importModal">
  <div class="modal">
    <h3>Importer un fichier JSON</h3>
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".json,application/json">
      <div class="drop-zone-icon">📂</div>
      <div class="drop-zone-label" id="dropLabel">Cliquez ou déposez un fichier .json</div>
      <div class="drop-zone-sub">Fichiers .json uniquement</div>
    </div>
    <div class="import-error" id="importError"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="btnImportCancel">Annuler</button>
      <button class="btn btn-accent" id="btnImportConfirm">Importer</button>
    </div>
  </div>
</div>

<textarea id="clipboardHelper"></textarea>
<div class="toast" id="toast"></div>

<script>
document.addEventListener("DOMContentLoaded", function() {
  var VERSION = '3.0';

  /* ── state ── */
  var blocks = [];
  var currentTab = 'preview';
  var editMode = false;
  var activeId = null;
  var pendingImport = null;

  var DEFAULTS = {
    day:         { type:'day',         label:'', date:'' },
    activity:    { type:'activity',     time:'',  duration:'', text:'' },
    memo:        { type:'memo',          time:'',  duration:'', text:'' },
    link:        { type:'link',        label:'', url:'' },
    image:       { type:'image',       url:'',   caption:'', alt:'' }
  };

  var META = {
    day:         { label:'JOUR',        color:'type-day' },
    activity:    { label:'ACTIVITÉ',    color:'type-activity' },
    memo:        { label:'MÉMO',         color:'type-memo' },
    link:        { label:'LIEN',        color:'type-link' },
    image:       { label:'IMAGE',       color:'type-image' }
  };

  /* ── utils ── */
  function uid()  { return Math.random().toString(36).slice(2, 9); }
  function g(id)  { return document.getElementById(id); }
  function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function formatDate(d) {
    try { return new Date(d + 'T00:00:00').toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' }); }
    catch(e) { return d; }
  }

  /* ── block ops ── */
  function addBlock(type) {
    var def = DEFAULTS[type]; if (!def) return;
    var b = { id: uid() };
    Object.keys(def).forEach(function(k) { b[k] = def[k]; });
    blocks.push(b);
    render(); setActive(b.id); sync();
  }

  function delBlock(id) {
    blocks = blocks.filter(function(b) { return b.id !== id; });
    if (activeId === id) activeId = null;
    render(); sync();
  }

  function moveBlock(id, dir) {
    var i = blocks.findIndex(function(b) { return b.id === id; });
    var j = i + dir;
    if (j < 0 || j >= blocks.length) return;
    var tmp = blocks[i]; blocks[i] = blocks[j]; blocks[j] = tmp;
    render(); setActive(id); sync();
  }

  function dupBlock(id) {
    var i = blocks.findIndex(function(b) { return b.id === id; });
    if (i < 0) return;
    var c = { id: uid() };
    Object.keys(blocks[i]).forEach(function(k) { if (k !== 'id') c[k] = blocks[i][k]; });
    blocks.splice(i + 1, 0, c);
    render(); setActive(c.id); sync();
  }

  function setActive(id) {
    var card = document.querySelector('.block-card[data-id="' + id + '"]');
    if (!card) return;
    var body = card.querySelector('.block-body');
    if (!body) return;

    if (activeId === id) {
      // Clicking the already-active block: toggle it closed
      var closing = !body.classList.contains('collapsed');
      body.classList.toggle('collapsed', closing);
      if (closing) { activeId = null; card.classList.remove('active'); }
      return;
    }

    // Activate new block: open it, mark active (don't touch others)
    activeId = id;
    var allCards = document.querySelectorAll('.block-card');
    for (var i = 0; i < allCards.length; i++) {
      allCards[i].classList.toggle('active', allCards[i].getAttribute('data-id') === id);
    }
    body.classList.remove('collapsed');
  }

  function setField(id, field, val) {
    var b = blocks.find(function(b) { return b.id === id; });
    if (!b) return;
    b[field] = val;
    // Update the preview badge text without rebuilding the editor
    var card = document.querySelector('.block-card[data-id="' + id + '"]');
    if (card) { var p = card.querySelector('.block-preview-text'); if (p) p.textContent = preview(b); }
    // Update JSON silently; skip preview rebuild while user is typing (avoids focus loss)
    if (currentTab === 'json') {
      var code = g('jsonCode');
      if (code) code.innerHTML = blocks.length ? syntaxHL(buildJSON()) : '<span style="color:#555">// Ajoutez des blocs pour générer le JSON</span>';
    }
    // Preview tab: don't rebuild while user types — it will refresh on next tab switch
  }

  /* ── preview text (editor badge) ── */
  function preview(b) {
    if (b.type === 'day')         return b.date ? formatDate(b.date).slice(0, 20) + (b.label ? ' · ' + b.label : '') : b.label || '(jour vide)';
    if (b.type === 'activity' || b.type === 'memo') return (b.time || '--:--') + (b.duration ? ' · ' + b.duration : '') + (b.text ? ' — ' + b.text.slice(0, 40) + (b.text.length > 40 ? '…' : '') : '');
    if (b.type === 'link')        return b.label || b.url || '(lien vide)';
    if (b.type === 'image')       return b.caption || b.url || '(image vide)';
    return '';
  }

  /* ── field HTML ── */
  function fields(b) {
    var id = b.id;
    if (b.type === 'day') return (
      '<div class="field-row">' +
        '<div class="field-group"><label class="field-label">Date</label>' +
        '<input class="field-input" type="date" data-id="' + id + '" data-field="date" value="' + esc(b.date) + '"></div>' +
        '<div class="field-group"><label class="field-label">Label</label>' +
        '<input class="field-input" type="text" data-id="' + id + '" data-field="label" value="' + esc(b.label) + '" placeholder="Ex: Arrivée à Nice"></div>' +
      '</div>'
    );
    if (b.type === 'activity' || b.type === 'memo') return (
      '<div class="field-row">' +
        '<div class="field-group"><label class="field-label">Heure</label>' +
        '<input class="field-input" type="time" data-id="' + id + '" data-field="time" value="' + esc(b.time) + '"></div>' +
        '<div class="field-group"><label class="field-label">Durée</label>' +
        '<input class="field-input" type="text" data-id="' + id + '" data-field="duration" value="' + esc(b.duration) + '" placeholder="2h30"></div>' +
      '</div>' +
      '<div class="field-group"><label class="field-label">Description</label>' +
      '<textarea class="field-textarea" data-id="' + id + '" data-field="text" placeholder="Décrivez l\'activité…">' + esc(b.text) + '</textarea></div>'
    );
    if (b.type === 'link') return (
      '<div class="field-group"><label class="field-label">Label</label>' +
      '<input class="field-input" type="text" data-id="' + id + '" data-field="label" value="' + esc(b.label) + '" placeholder="Ex: Réservation hôtel"></div>' +
      '<div class="field-group"><label class="field-label">URL</label>' +
      '<input class="field-input" type="url" data-id="' + id + '" data-field="url" value="' + esc(b.url) + '" placeholder="https://…"></div>'
    );
    if (b.type === 'image') return (
      '<div class="field-group"><label class="field-label">URL image</label>' +
      '<input class="field-input" type="url" data-id="' + id + '" data-field="url" value="' + esc(b.url) + '" placeholder="https://…"></div>' +
      '<div class="field-row">' +
        '<div class="field-group"><label class="field-label">Légende</label>' +
        '<input class="field-input" type="text" data-id="' + id + '" data-field="caption" value="' + esc(b.caption) + '" placeholder="Description…"></div>' +
        '<div class="field-group"><label class="field-label">Alt</label>' +
        '<input class="field-input" type="text" data-id="' + id + '" data-field="alt" value="' + esc(b.alt) + '" placeholder="Texte alt…"></div>' +
      '</div>'
    );
    return '';
  }

  /* ── render editor ── */
  var collapsedGroups = {}; // dayBlockId -> true if group collapsed

  function blockCard(b, i, openState) {
    var on = b.id === activeId;
    var isOpen = (b.id in openState) ? openState[b.id] : on;
    var m = META[b.type];
    var badge = (b.type === 'day' && b.date) ? formatDate(b.date).slice(0, 16) : m.label;
    return '<div class="block-card' + (on ? ' active' : '') + '" data-id="' + b.id + '">' +
      '<div class="block-header" data-action="toggle" data-id="' + b.id + '">' +
      '<span class="block-handle" draggable="true" data-drag="true" data-id="' + b.id + '">⠿</span>' +
      '<span class="block-type-badge ' + m.color + '">' + esc(badge) + '</span>' +
      '<span class="block-preview-text">' + esc(preview(b)) + '</span>' +
      '<div class="block-actions">' +
      (i > 0 ? '<button class="block-action-btn" data-action="up" data-id="' + b.id + '">↑</button>' : '') +
      (i < blocks.length - 1 ? '<button class="block-action-btn" data-action="down" data-id="' + b.id + '">↓</button>' : '') +
      '<button class="block-action-btn" data-action="dup" data-id="' + b.id + '">⎘</button>' +
      '<button class="block-action-btn del" data-action="del" data-id="' + b.id + '">✕</button>' +
      '</div></div>' +
      '<div class="block-body' + (isOpen ? '' : ' collapsed') + '">' + fields(b) + '<button class="btn-validate" data-action="validate" data-id="' + b.id + '">Valider</button></div>' +
      '</div>';
  }

  function render() {
    var list  = g('blocksList');
    var empty = g('emptyState');
    g('blockCount').textContent = blocks.length + ' bloc(s)';
    empty.style.display = blocks.length === 0 ? 'flex' : 'none';
    if (blocks.length === 0) { list.innerHTML = ''; return; }

    // Snapshot open/closed state
    var openState = {};
    var existing = list.querySelectorAll('.block-card');
    for (var e = 0; e < existing.length; e++) {
      var eid = existing[e].getAttribute('data-id');
      var body = existing[e].querySelector('.block-body');
      openState[eid] = body ? !body.classList.contains('collapsed') : false;
    }

    // Build groups: each 'day' block starts a new group
    var groups = []; // [{dayBlock, children:[]}]
    var currentGroup = null;
    for (var i = 0; i < blocks.length; i++) {
      var b = blocks[i];
      if (b.type === 'day') {
        currentGroup = { dayBlock: b, dayIdx: i, children: [] };
        groups.push(currentGroup);
      } else if (currentGroup) {
        currentGroup.children.push({ block: b, idx: i });
      } else {
        // Blocks before any day — ungrouped
        if (!groups.length || groups[0].dayBlock) {
          groups.unshift({ dayBlock: null, dayIdx: -1, children: [] });
        }
        groups[0].children.push({ block: b, idx: i });
      }
    }

    var html = '';
    for (var g2 = 0; g2 < groups.length; g2++) {
      var grp = groups[g2];
      var grpCollapsed = grp.dayBlock ? !!collapsedGroups[grp.dayBlock.id] : false;
      var childCount = grp.children.length;

      if (grp.dayBlock) {
        // Group with day header
        var dayLabel = (grp.dayBlock.date ? formatDate(grp.dayBlock.date).slice(0, 16) : '') + (grp.dayBlock.label ? ' — ' + grp.dayBlock.label : '');
        html += '<div class="block-group">';
        html += '<div class="block-group-header' + (grpCollapsed ? ' collapsed' : '') + '" data-action="toggle-group" data-group-id="' + grp.dayBlock.id + '">' +
          '<span class="block-group-label">📅 ' + esc(dayLabel) + '</span>' +
          '<span class="block-group-count">' + childCount + ' bloc(s)</span>' +
          '<span class="block-group-chevron">▾</span>' +
          '</div>';
        // Day block card itself (always visible, outside group body)
        html += blockCard(grp.dayBlock, grp.dayIdx, openState);
        // Children
        html += '<div class="block-group-body' + (grpCollapsed ? ' collapsed' : '') + '" data-group-body="' + grp.dayBlock.id + '">';
        for (var c = 0; c < grp.children.length; c++) {
          html += blockCard(grp.children[c].block, grp.children[c].idx, openState);
        }
        html += '</div></div>';
      } else {
        // Ungrouped blocks (before first day)
        html += '<div class="ungrouped-blocks">';
        for (var c2 = 0; c2 < grp.children.length; c2++) {
          html += blockCard(grp.children[c2].block, grp.children[c2].idx, openState);
        }
        html += '</div>';
      }
    }

    list.innerHTML = html;
    attachDragHandles();
  }

  /* ── drag & drop reorder ── */
  var dragSrcId = null;
  var dropTargetId = null;
  var dropPosition = 'after'; // 'before' or 'after'

  function clearDragStyles() {
    var cards = g('blocksList').querySelectorAll('.block-card');
    for (var i = 0; i < cards.length; i++)
      cards[i].classList.remove('dragging', 'drag-over-top', 'drag-over-bottom');
  }

  function getCard(el) {
    while (el && el !== g('blocksList')) {
      if (el.classList && el.classList.contains('block-card')) return el;
      el = el.parentElement;
    }
    return null;
  }

  // Attach drag listeners directly to handles after each render
  function attachDragHandles() {
    var handles = g('blocksList').querySelectorAll('[data-drag="true"]');
    for (var i = 0; i < handles.length; i++) {
      (function(handle) {
        handle.addEventListener('dragstart', function(e) {
          dragSrcId = handle.getAttribute('data-id');
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', dragSrcId);
          var card = getCard(handle);
          if (card) setTimeout(function() { card.classList.add('dragging'); }, 0);
        });
      })(handles[i]);
    }
  }

  g('blocksList').addEventListener('dragend', function() {
    clearDragStyles();
    dragSrcId = null;
    dropTargetId = null;
  });

  g('blocksList').addEventListener('dragover', function(e) {
    e.preventDefault();
    if (!dragSrcId) return;
    var card = getCard(e.target);
    if (!card) return;
    var tid = card.getAttribute('data-id');
    if (tid === dragSrcId) return;
    clearDragStyles();
    var srcCard = g('blocksList').querySelector('[data-id="' + dragSrcId + '"]');
    if (srcCard) srcCard.classList.add('dragging');
    var rect = card.getBoundingClientRect();
    dropPosition = (e.clientY < rect.top + rect.height / 2) ? 'before' : 'after';
    dropTargetId = tid;
    card.classList.add(dropPosition === 'before' ? 'drag-over-top' : 'drag-over-bottom');
  });

  g('blocksList').addEventListener('drop', function(e) {
    e.preventDefault();
    clearDragStyles();
    if (!dragSrcId || !dropTargetId || dragSrcId === dropTargetId) return;
    var srcIdx = -1, tgtIdx = -1;
    for (var i = 0; i < blocks.length; i++) {
      if (blocks[i].id === dragSrcId) srcIdx = i;
      if (blocks[i].id === dropTargetId) tgtIdx = i;
    }
    if (srcIdx < 0 || tgtIdx < 0) return;
    var moved = blocks.splice(srcIdx, 1)[0];
    tgtIdx = -1;
    for (var j = 0; j < blocks.length; j++) { if (blocks[j].id === dropTargetId) { tgtIdx = j; break; } }
    var insertAt = dropPosition === 'after' ? tgtIdx + 1 : tgtIdx;
    blocks.splice(insertAt, 0, moved);
    var savedId = dragSrcId;
    dragSrcId = null; dropTargetId = null;
    render(); setActive(savedId); sync();
  });

  /* ── event delegation: editor list ── */
  g('blocksList').addEventListener('click', function(e) {
    var el = e.target;
    while (el && el !== this) {
      var a = el.getAttribute('data-action');
      if (a) {
        var id = el.getAttribute('data-id');
        e.stopPropagation();
        if (a === 'toggle') setActive(id);
        if (a === 'toggle-group') {
          var gid = el.getAttribute('data-group-id');
          collapsedGroups[gid] = !collapsedGroups[gid];
          // Toggle DOM directly without full render
          var hdr = el.closest ? el.closest('.block-group-header') : el;
          hdr.classList.toggle('collapsed', collapsedGroups[gid]);
          var body = document.querySelector('.block-group-body[data-group-body="' + gid + '"]');
          if (body) body.classList.toggle('collapsed', collapsedGroups[gid]);
          return;
        }
        if (a === 'validate') {
          sync();
          // Flash the button green briefly
          var vBtn = document.querySelector('.btn-validate[data-id="' + id + '"]');
          if (vBtn) {
            vBtn.classList.add('saved');
            setTimeout(function() { if (vBtn) vBtn.classList.remove('saved'); }, 1200);
          }
        }
        if (a === 'del')    delBlock(id);
        if (a === 'dup')    dupBlock(id);
        if (a === 'up')     moveBlock(id, -1);
        if (a === 'down')   moveBlock(id, 1);
        return;
      }
      el = el.parentElement;
    }
  });

  /* ── field input delegation on blocksList ── */
  g('blocksList').addEventListener('input', function(e) {
    var el = e.target;
    var id = el.getAttribute('data-id');
    var field = el.getAttribute('data-field');
    if (id && field) setField(id, field, el.value);
  });
  g('blocksList').addEventListener('change', function(e) {
    var el = e.target;
    var id = el.getAttribute('data-id');
    var field = el.getAttribute('data-field');
    if (id && field) setField(id, field, el.value);
  });

  /* ── block adder ── */
  g('btnAddBlock').addEventListener('click', function() {
    var sel = g('blockTypeSelect');
    var type = sel.value;
    if (!type) return;
    addBlock(type);
    sel.value = '';
  });

  /* ── header ── */
  g('btnImport').addEventListener('click', openImport);
  g('btnClear').addEventListener('click', function() {
    if (!blocks.length) return;
    blocks = []; activeId = null; render(); sync(); toast('Document vidé', 'ok');
  });
  g('btnExport').addEventListener('click', exportJSON);
  g('btnEdit').addEventListener('click', function() {
    editMode = !editMode;
    var app = document.querySelector('.app');
    app.classList.toggle('edit-mode', editMode);
    this.textContent = editMode ? '✕ Fermer' : '✏ Édition';
    this.classList.toggle('active', editMode);
    var hc = document.querySelector('.header-center');
    if (hc) hc.classList.toggle('visible', editMode);
    if (editMode) sync();
  });
  g('btnCopy').addEventListener('click', copyJSON);

  g('docTitle').addEventListener('input', sync);
  g('titleImgUrl').addEventListener('input', sync);
  g('btnClearTitleImg').addEventListener('click', function() {
    g('titleImgUrl').value = '';
    sync();
  });

  /* ── tabs ── */
  // Tab switching handled by btnEdit button

  /* ── JSON build & output ── */
  function buildJSON() {
    return {
      schema: 'samos-planning/v' + VERSION,
      type: 'document',
      meta: { title: g('docTitle').value || 'Document', version: VERSION, created: new Date().toISOString(), blockCount: blocks.length },
      blocks: blocks.map(function(b) {
        var o = {}; Object.keys(b).forEach(function(k) { if (k !== 'id') o[k] = b[k]; }); return o;
      })
    };
  }

  function syntaxHL(json) {
    return JSON.stringify(json, null, 2)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function(m) {
        var c = 'num';
        if (/^"/.test(m)) c = /:$/.test(m) ? 'key' : 'str';
        else if (/true|false/.test(m)) c = 'bool';
        else if (/null/.test(m)) c = 'null';
        return '<span class="' + c + '">' + m + '</span>';
      });
  }

  function sync() {
    // Always update preview
    var area = g('previewArea');
    area.innerHTML = '';
    area.appendChild(buildPreview());
    // Update JSON panel if in edit mode
    if (editMode) {
      var code = g('jsonCode');
      code.innerHTML = blocks.length ? syntaxHL(buildJSON()) : '<span style="color:#555">// Ajoutez des blocs pour générer le JSON</span>';
    }
    // Auto-save to localStorage
    saveToStorage();
  }

  // switchTab removed — preview always on, JSON only in edit mode

  /* ── clipboard / export ── */
  function copyJSON() {
    var text = JSON.stringify(buildJSON(), null, 2);
    var helper = g('clipboardHelper');
    helper.value = text; helper.select();
    try {
      document.execCommand('copy'); toast('JSON copié !', 'ok');
    } catch(e) {
      if (navigator.clipboard) navigator.clipboard.writeText(text).then(function() { toast('JSON copié !', 'ok'); }).catch(function() { toast('Utilisez Télécharger', ''); });
      else toast('Utilisez Télécharger', '');
    }
  }

  function exportJSON() {
    var text = JSON.stringify(buildJSON(), null, 2);
    var name = (g('docTitle').value || 'document').replace(/[^a-z0-9]/gi, '_') + '.json';
    try {
      var blob = new Blob([text], { type:'application/json' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a'); a.href = url; a.download = name;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
      toast('Téléchargé : ' + name, 'ok');
    } catch(e) {
      try {
        var uri = 'data:application/json;charset=utf-8,' + encodeURIComponent(text);
        var a2 = document.createElement('a'); a2.href = uri; a2.download = name;
        document.body.appendChild(a2); a2.click(); document.body.removeChild(a2);
        toast('Téléchargé : ' + name, 'ok');
      } catch(e2) { toast('Erreur — copiez le JSON', 'err'); }
    }
  }

  /* ── import modal ── */
  function openImport() {
    pendingImport = null;
    g('importError').textContent = '';
    g('dropLabel').textContent = 'Cliquez ou déposez un fichier .json';
    g('dropZone').classList.remove('file-ok');
    g('fileInput').value = '';
    g('importModal').classList.add('show');
  }
  function closeImport() { g('importModal').classList.remove('show'); pendingImport = null; }
  g('btnImportCancel').addEventListener('click', closeImport);
  g('importModal').addEventListener('click', function(e) { if (e.target === this) closeImport(); });

  g('fileInput').addEventListener('change', function() { if (this.files && this.files[0]) readFile(this.files[0]); });

  var dz = g('dropZone');
  dz.addEventListener('dragover', function(e) { e.preventDefault(); dz.classList.add('dragover'); });
  dz.addEventListener('dragleave', function() { dz.classList.remove('dragover'); });
  dz.addEventListener('drop', function(e) {
    e.preventDefault(); dz.classList.remove('dragover');
    var f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
    if (f) readFile(f);
  });

  function readFile(file) {
    g('importError').textContent = '';
    if (!file.name.endsWith('.json') && file.type !== 'application/json') {
      g('importError').textContent = '⚠ Fichier invalide — choisissez un .json'; return;
    }
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var data = JSON.parse(e.target.result);
        if (!data.blocks || !Array.isArray(data.blocks)) throw new Error('Champ "blocks" manquant');
        pendingImport = data;
        g('dropLabel').textContent = '✓ ' + file.name;
        g('dropZone').classList.add('file-ok');
        g('importError').textContent = '';
      } catch(err) {
        g('importError').textContent = '⚠ ' + err.message;
        pendingImport = null;
      }
    };
    reader.onerror = function() { g('importError').textContent = '⚠ Erreur de lecture'; };
    reader.readAsText(file);
  }

  g('btnImportConfirm').addEventListener('click', function() {
    if (!pendingImport) { g('importError').textContent = '⚠ Sélectionnez un fichier .json'; return; }
    blocks = pendingImport.blocks.map(function(b) {
      var o = { id: uid() }; Object.keys(b).forEach(function(k) { o[k] = b[k]; }); return o;
    });
    if (pendingImport.meta && pendingImport.meta.title) g('docTitle').value = pendingImport.meta.title;
    activeId = null;
    render(); sync(); closeImport();
    saveToStorage();
    toast('Importé et sauvegardé — ' + blocks.length + ' bloc(s)', 'ok');
  });

  /* ── toast ── */
  var toastT = null;
  function toast(msg, type) {
    var el = g('toast');
    el.textContent = msg;
    el.className = 'toast show' + (type ? ' ' + type : '');
    if (toastT) clearTimeout(toastT);
    toastT = setTimeout(function() { el.classList.remove('show'); }, 2600);
  }

  /* ── preview builder ── */
  function mk(tag, cls) { var e = document.createElement(tag); if (cls) e.className = cls; return e; }

  function buildPreview() {
    var wrap = mk('div', 'preview-wrap');

    // Toolbar with collapse-all / expand-all
    // Doc title block
    var titleBlock = mk('div', 'pv-doc-title');
    var imgUrl = g('titleImgUrl') ? g('titleImgUrl').value.trim() : '';
    if (imgUrl) {
      var titleImg = document.createElement('img');
      titleImg.className = 'pv-doc-title-img';
      titleImg.src = imgUrl;
      titleImg.alt = '';
      titleBlock.appendChild(titleImg);
    }
    var titleText = mk('div', 'pv-doc-title-text');
    titleText.textContent = g('docTitle').value || 'Document';
    titleBlock.appendChild(titleText);
    wrap.appendChild(titleBlock);

    var toolbar = mk('div', 'pv-toolbar');
    var btnCollapse = mk('button', 'pv-toolbar-btn'); btnCollapse.textContent = '⊟ Tout replier';
    var btnExpand   = mk('button', 'pv-toolbar-btn'); btnExpand.textContent   = '⊞ Tout déplier';
    btnCollapse.addEventListener('click', function(e) {
      e.stopPropagation();
      var days = wrap.querySelectorAll('.pv-day');
      for (var d = 0; d < days.length; d++) {
        days[d].classList.add('collapsed');
        var tl = days[d].nextSibling;
        if (tl && tl.classList && tl.classList.contains('pv-timeline')) tl.style.display = 'none';
      }
    });
    btnExpand.addEventListener('click', function(e) {
      e.stopPropagation();
      var days = wrap.querySelectorAll('.pv-day');
      for (var d = 0; d < days.length; d++) {
        days[d].classList.remove('collapsed');
        var tl = days[d].nextSibling;
        if (tl && tl.classList && tl.classList.contains('pv-timeline')) tl.style.display = '';
      }
    });
    toolbar.appendChild(btnCollapse);
    toolbar.appendChild(btnExpand);
    wrap.appendChild(toolbar);

    var i = 0;

    while (i < blocks.length) {
      var b = blocks[i];

      /* ── DAY BLOCK ── */
      if (b.type === 'day') {
        var dayDiv = mk('div', 'pv-day');
        var header = mk('div', 'pv-day-header');

        /* date (large) */
        var dateEl = mk('span', 'pv-day-date');
        dateEl.textContent = b.date ? formatDate(b.date) : 'Jour';
        header.appendChild(dateEl);

        /* separator + label (if any) */
        if (b.label && b.label.trim()) {
          var sep = mk('span', 'pv-day-sep'); sep.textContent = '·'; header.appendChild(sep);
          var lblEl = mk('span', 'pv-day-label'); lblEl.textContent = b.label; header.appendChild(lblEl);
        }
        var chev = mk('span', 'pv-day-chevron'); chev.textContent = '▾';
        header.appendChild(chev);
        dayDiv.appendChild(header);
        dayDiv.addEventListener('click', function(el) {
          return function() {
            el.classList.toggle('collapsed');
            var tl = el.nextSibling;
            if (tl && tl.classList && tl.classList.contains('pv-timeline')) {
              tl.style.display = el.classList.contains('collapsed') ? 'none' : '';
            }
          };
        }(dayDiv));
        wrap.appendChild(dayDiv);
        i++;

        /* timeline indented under this day */
        var tl = mk('div', 'pv-timeline');

        while (i < blocks.length && blocks[i].type !== 'day') {
          var cb = blocks[i];

          if (cb.type === 'activity' || cb.type === 'memo') {
            var isMemo = cb.type === 'memo';
            var row = mk('div', isMemo ? 'pv-activity-row pv-memo-row' : 'pv-activity-row');
            /* time column */
            var tc = mk('div', 'pv-time');
            var tv = mk('div', 'pv-time-val'); tv.textContent = cb.time || '—'; tc.appendChild(tv);
            if (cb.duration) { var td = mk('div', 'pv-time-dur'); td.textContent = cb.duration; tc.appendChild(td); }
            row.appendChild(tc);
            /* content column */
            var cc = mk('div', 'pv-activity-content');
            if (cb.text) { var desc = mk('p', 'pv-activity-desc'); desc.textContent = cb.text; cc.appendChild(desc); }
            row.appendChild(cc);
            tl.appendChild(row);
            i++;
          } else {
            /* link/image without activity */
            var orp = mk('div', 'pv-orphan');
            addItem(orp, cb);
            tl.appendChild(orp);
            i++;
          }
        }

        wrap.appendChild(tl);
        continue;
      }

      /* top-level orphan (before any day) */
      var o2 = mk('div', 'pv-orphan'); addItem(o2, b); wrap.appendChild(o2); i++;
    }

    return wrap;
  }

  function addItem(parent, b) {
    if (b.type === 'link') {
      var a = mk('a', 'pv-link'); a.href = b.url || '#'; a.target = '_blank';
      a.textContent = '🔗 ' + (b.label || b.url || 'Lien'); parent.appendChild(a);
    } else if (b.type === 'image') {
      if (b.url) {
        var imgWrap = mk('div', 'pv-img-wrap'); var img = mk('img', 'pv-img'); img.src = b.url; img.alt = b.alt || b.caption || ''; imgWrap.appendChild(img); parent.appendChild(imgWrap);
      } else {
        var ph = mk('div', 'pv-img-ph'); ph.textContent = '🖼 Image (URL manquante)'; parent.appendChild(ph);
      }
      if (b.caption) { var cap = mk('p', 'pv-img-caption'); cap.textContent = b.caption; parent.appendChild(cap); }
    }
  }

  /* ── localStorage persistence ── */
  var STORAGE_KEY = 'samos-planning-doc';

  function saveToStorage() {
    try {
      var data = {
        title: g('docTitle').value,
        titleImg: g('titleImgUrl') ? g('titleImgUrl').value : '',
        blocks: blocks.map(function(b) {
          var o = {}; Object.keys(b).forEach(function(k) { o[k] = b[k]; }); return o;
        })
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch(e) { /* silently fail if storage unavailable */ }
  }

  function loadFromStorage() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return false;
      var data = JSON.parse(raw);
      if (!data || !Array.isArray(data.blocks)) return false;
      blocks = data.blocks.map(function(b) {
        if (!b.id) b.id = uid();
        return b;
      });
      if (data.title) g('docTitle').value = data.title;
      if (data.titleImg && g('titleImgUrl')) g('titleImgUrl').value = data.titleImg;
      return true;
    } catch(e) { return false; }
  }

  /* ── demo data ── */
  blocks = [
    { id:uid(), type:'day',      date:'2025-07-15', label:'Arrivée à Nice' },
    { id:uid(), type:'activity', time:'14:00', duration:'2h',   text:"Arrivée à l'aéroport de Nice Côte d'Azur. Récupération des bagages et transfert vers l'hôtel." },
    { id:uid(), type:'link',     label:'Réservation hôtel Negresco', url:'https://www.lenegresco.com' },
    { id:uid(), type:'activity', time:'19:30', duration:'1h30', text:'Dîner de bienvenue sur la Promenade des Anglais. Restaurant Le Plongeoir, vue mer exceptionnelle.' },
    { id:uid(), type:'image',    url:'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4f/Nice_Promenade_des_Anglais.jpg/1280px-Nice_Promenade_des_Anglais.jpg', caption:'La Promenade des Anglais, Nice', alt:'Promenade des Anglais' },
    { id:uid(), type:'day',      date:'2025-07-16', label:'Monaco' },
    { id:uid(), type:'activity', time:'09:00', duration:'1h',   text:'Départ en train vers Monaco. Visite du Palais du Prince et des jardins exotiques.' },
    { id:uid(), type:'link',     label:'Infos Palais Princier', url:'https://www.palais.mc' },
    { id:uid(), type:'activity', time:'14:00', duration:'3h',   text:'Après-midi au Casino de Monte-Carlo et promenade dans le quartier de la Condamine.' },
    { id:uid(), type:'image',    url:'https://upload.wikimedia.org/wikipedia/commons/thumb/7/7f/Monte_carlo_casino_2019.jpg/1280px-Monte_carlo_casino_2019.jpg', caption:'Casino de Monte-Carlo', alt:'Casino de Monte-Carlo' }
  ];

  // Load from localStorage, fall back to demo data
  var loaded = loadFromStorage();
  if (!loaded) {
    // demo data already set above
  }

  render();
  sync();
  if (loaded) toast('Document chargé', 'ok');

});
</script>
